; CortiPod Firmware - PlatformIO Configuration
; Target: nRF52832 (Adafruit Feather nRF52832 for dev, Raytac MDBT42Q for production)
;
; Build environments:
;   dev    - Adafruit Feather nRF52832 (USB serial debug)
;   prod   - Raytac MDBT42Q (production module, no USB)

[platformio]
default_envs = dev

; ---------------------------------------------------------------------------
; Shared settings across all environments
; ---------------------------------------------------------------------------
[env]
platform    = nordicnrf52
framework   = arduino
monitor_speed = 115200

build_flags =
    -DDEBUG_BUILD
    -Wall

lib_deps =
    adafruit/Adafruit nRF52@^1.6.1
    Wire

; ---------------------------------------------------------------------------
; Development board: Adafruit Feather nRF52832
; ---------------------------------------------------------------------------
[env:dev]
board = adafruit_feather_nrf52832
build_flags =
    ${env.build_flags}
    -DENV_DEV
    -DCORTIPOD_DEBUG=1

; ---------------------------------------------------------------------------
; Production module: Raytac MDBT42Q (same nRF52832 silicon, custom pinout)
; ---------------------------------------------------------------------------
[env:prod]
board = adafruit_feather_nrf52832   ; closest match — override pin defs via config.h
build_flags =
    ${env.build_flags}
    -DENV_PROD
    -DCORTIPOD_DEBUG=0
